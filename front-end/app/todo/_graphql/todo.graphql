query GetTodos {
  todos {
    id
    title
    completed
  }
}

query GetTodo($id: ID!) {
  todo(id: $id) {
    id
    title
    completed
  }
}

mutation CreateTodo($title: String!) {
  createTodo(title: $title) {
    id
    title
    completed
  }
}

mutation UpdateTodo($id: ID!, $title: String, $completed: Boolean) {
  updateTodo(id: $id, title: $title, completed: $completed) {
    id
    title
    completed
  }
}

mutation DeleteTodo($id: ID!) {
  deleteTodo(id: $id)
}
