name: Backend Production CD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'

permissions:
  contents: read

concurrency:
  group: backend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check required secrets
        id: secret_check
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip backend production deploy (missing secrets)
        if: steps.secret_check.outputs.ready != 'true'
        run: echo "Skipping backend production deploy: set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets."

      - name: Checkout
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.secret_check.outputs.ready == 'true'
        run: npm ci

      - name: Deploy Worker to production
        if: steps.secret_check.outputs.ready == 'true'
        run: npm exec --workspace worker wrangler -- deploy
