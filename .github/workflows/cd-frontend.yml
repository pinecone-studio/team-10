name: Frontend Production CD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'

permissions:
  contents: read

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check required secrets
        id: secret_check
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip frontend production deploy (missing secrets)
        if: steps.secret_check.outputs.ready != 'true'
        run: echo "Skipping frontend production deploy: set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets."

      - name: Checkout
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.secret_check.outputs.ready == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.secret_check.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        if: steps.secret_check.outputs.ready == 'true'
        working-directory: apps/web
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build frontend artifact for production
        if: steps.secret_check.outputs.ready == 'true'
        working-directory: apps/web
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel production
        if: steps.secret_check.outputs.ready == 'true'
        working-directory: apps/web
        run: vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
