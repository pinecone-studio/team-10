name: Front-End CI

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]
    branches:
      - main
      - master
    paths:
      - "front-end/**"
      - ".github/workflows/front-end-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: ./front-end

jobs:
  guard:
    name: Check code-ready label
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ contains(github.event.pull_request.labels.*.name, 'code-ready') }}
    steps:
      - run: echo "Label check complete"
        working-directory: .

  lint:
    name: Lint
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run build
