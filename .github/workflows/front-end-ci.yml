name: Front-End CI

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths:
      - "front-end/**"
      - "back-end/graphql/generated/**"
      - ".github/workflows/front-end-ci.yml"

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./front-end

jobs:
  guard:
    name: Check code-ready label
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ contains(github.event.pull_request.labels.*.name, 'code-ready') }}
    steps:
      - run: echo "Label check complete"
        working-directory: .

  lint:
    name: Lint
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: front-end-build
          path: |
            front-end/.next
            front-end/graphql/generated
          if-no-files-found: error

  test:
    name: Test
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run codegen
      - run: npm test

  preview:
    name: Preview Artifact
    needs: [guard, lint, build, test]
    runs-on: ubuntu-latest
    if: needs.guard.outputs.ready == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: front-end-build
          path: front-end-preview
