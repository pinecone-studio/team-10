name: Front-End CI

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]
    branches:
      - main
      - master
    paths:
      - "front-end/**"
      - ".github/workflows/front-end-ci.yml"

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./front-end

jobs:
  guard:
    name: Check code-ready label
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ contains(github.event.pull_request.labels.*.name, 'code-ready') }}
    steps:
      - run: echo "Label check complete"
        working-directory: .

  lint:
    name: Lint
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy-preview:
    name: Deploy Preview
    needs: [guard, build]
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - name: Remove conflicting lockfiles for Vercel
        run: rm -f bun.lock yarn.lock
      - name: Pull Vercel Environment Information
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - name: Build Project Artifacts
        run: |
          GRAPHQL_SCHEMA_URL="" npx vercel build --token="$VERCEL_TOKEN"
      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          DEPLOYMENT_URL="$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOYMENT_URL"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- front-end-preview-comment -->';
            const body = [
              marker,
              '### Front-End Preview Deploy',
              '',
              `- Commit: \`${context.payload.pull_request.head.sha}\``,
              `- Preview: ${process.env.DEPLOYMENT_URL}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
