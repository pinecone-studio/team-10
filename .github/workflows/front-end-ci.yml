name: Front-End CI

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths:
      - "front-end/**"
      - "back-end/graphql/generated/**"
      - ".github/workflows/front-end-ci.yml"

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./front-end

jobs:
  verify:
    name: Verify
    if: contains(github.event.pull_request.labels.*.name, 'code-ready')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front-end/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
