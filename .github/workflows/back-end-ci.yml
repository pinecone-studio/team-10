name: Back-End CI

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths:
      - "back-end/**"

permissions:
  id-token: write
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./back-end

jobs:
  guard:
    name: Check code-ready label
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ contains(github.event.pull_request.labels.*.name, 'code-ready') }}
    steps:
      - run: echo "Label check complete"
        working-directory: .

  install:
    name: Install
    needs: guard
    if: needs.guard.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: oven-sh/setup-bun@v2
      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: back-end/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('back-end/bun.lock') }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: bun install

  lint:
    name: Lint & Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: back-end/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('back-end/bun.lock') }}
      - run: bun run lint

  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: back-end/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('back-end/bun.lock') }}

  preview:
    name: Preview
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: back-end/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('back-end/bun.lock') }}
