name: Back-End CI

on:
  pull_request:
    types: [labeled, synchronize, reopened]
    paths:
      - "back-end/**"
      - ".github/workflows/back-end-ci.yml"

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    working-directory: ./back-end

jobs:
  verify:
    name: Verify
    if: contains(github.event.pull_request.labels.*.name, 'code-ready')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back-end/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
