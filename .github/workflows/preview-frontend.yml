name: Frontend Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/web/**'

permissions:
  contents: read

concurrency:
  group: frontend-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-scope:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/worker/**'
            frontend:
              - 'apps/web/**'

  deploy-preview:
    needs: detect-scope
    if: needs.detect-scope.outputs.frontend == 'true' && needs.detect-scope.outputs.backend != 'true'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check required secrets
        id: secret_check
        run: |
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip frontend preview (missing secrets)
        if: steps.secret_check.outputs.ready != 'true'
        run: echo "Skipping frontend preview: set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID repository secrets."

      - name: Checkout
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.secret_check.outputs.ready == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.secret_check.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        if: steps.secret_check.outputs.ready == 'true'
        working-directory: apps/web
        run: vercel pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Build frontend artifact for Vercel
        if: steps.secret_check.outputs.ready == 'true'
        working-directory: apps/web
        run: vercel build --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel preview
        if: steps.secret_check.outputs.ready == 'true'
        id: deploy
        working-directory: apps/web
        run: |
          set -euo pipefail
          url="$(vercel deploy --prebuilt --token="${VERCEL_TOKEN}")"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"

      - name: Preview URL
        if: steps.secret_check.outputs.ready == 'true'
        run: echo "Frontend preview URL: ${{ steps.deploy.outputs.url }}"
