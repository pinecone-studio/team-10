name: Backend Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'apps/worker/**'

permissions:
  contents: read

concurrency:
  group: backend-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-scope:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/worker/**'
            frontend:
              - 'apps/web/**'

  deploy-preview:
    needs: detect-scope
    if: needs.detect-scope.outputs.backend == 'true' && needs.detect-scope.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PREVIEW_WORKER_NAME: worker-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Check required secrets
        id: secret_check
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip backend preview (missing secrets)
        if: steps.secret_check.outputs.ready != 'true'
        run: echo "Skipping backend preview: set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets."

      - name: Checkout
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.secret_check.outputs.ready == 'true'
        run: npm ci

      - name: Deploy Worker preview
        if: steps.secret_check.outputs.ready == 'true'
        run: npm exec --workspace worker wrangler -- deploy --name "${PREVIEW_WORKER_NAME}"

      - name: Preview URL hint
        if: steps.secret_check.outputs.ready == 'true'
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}" ]; then
            echo "Backend preview URL: https://${PREVIEW_WORKER_NAME}.${{ secrets.CLOUDFLARE_WORKERS_SUBDOMAIN }}.workers.dev"
          else
            echo "Set secret CLOUDFLARE_WORKERS_SUBDOMAIN to print deterministic preview URLs in logs."
          fi
