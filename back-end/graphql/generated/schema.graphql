type Mutation {
  createOrder(approvalTarget: String, departmentId: ID, expectedArrivalAt: String, officeId: ID, status: String!, totalCost: Float, userId: ID, whyOrdered: String!): Order!
  createReceive(note: String, officeId: ID, orderId: ID, receivedAt: String, receivedByUserId: ID, status: String!): Receive!
  deleteOrder(id: ID!): Boolean!
  deleteReceive(id: ID!): Boolean!
  updateOrder(approvalTarget: String, departmentId: ID, expectedArrivalAt: String, id: ID!, officeId: ID, status: String, totalCost: Float, userId: ID, whyOrdered: String): Order
  updateReceive(id: ID!, note: String, officeId: ID, orderId: ID, receivedAt: String, receivedByUserId: ID, status: String): Receive
}

type Order {
  approvalTarget: String!
  departmentId: ID
  expectedArrivalAt: String
  id: ID!
  officeId: ID!
  status: String!
  totalCost: Float
  userId: ID!
  whyOrdered: String!
}

type Query {
  order(id: ID!): Order
  orders: [Order!]!
  receive(id: ID!): Receive
  receives: [Receive!]!
}

type Receive {
  id: ID!
  note: String
  officeId: ID!
  orderId: ID!
  receivedAt: String!
  receivedByUserId: ID!
  status: String!
}